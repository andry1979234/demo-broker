<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Demo Broker — Kasper Coin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts@3.9.0/dist/lightweight-charts.standalone.production.js"></script>
  </head>
  <body>
    <div id="app">
      <h2>Kasper Coin — Demo</h2>
      <div id="chart"></div>

      <div id="controls">
        <label>Amount: <input id="amount" value="1" /></label>
        <label>Expiry (s):
          <select id="expiry">
            <option value="5">5s</option>
            <option value="10">10s</option>
            <option value="30">30s</option>
          </select>
        </label>
        <button id="buy">Buy</button>
        <button id="sell">Sell</button>
      </div>

      <h3>Active Trades</h3>
      <ul id="trades"></ul>
    </div>

    <script src="app.js"></script>
  </body>
</html>
